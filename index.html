<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Gambar Pro Anti-Hilang</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3vw;
            margin: 0;
        }

        .main-container {
            width: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #scrollBox {
            height: 100vh;
            overflow-y: auto;
            padding: 3vw;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5vw;
            align-content: flex-start;
        }

        .img-item {
            width: calc(33.33% - 1vw);
            background: #222;
            border-radius: 1vw;
            overflow: hidden;
            border: 0.5vw solid #444;
            position: relative;
            -webkit-touch-callout: none; 
            user-select: none;
        }

        .img-item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .delete-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(230, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 10px;
            text-align: center;
            padding: 5px;
            z-index: 5;
            gap: 8px;
        }

        .btn-confirm {
            background: white;
            color: red;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        .btn-cancel {
            background: #444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        .controls {
            padding: 8px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-galeri {
            background: #444;
            color: #00baeb;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            display: inline-block;
        }

        #fileInput {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 2px;
        }

        .btn {
            flex: 1;
            padding: 1vw;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 3vw;
            text-transform: uppercase;
            color: #00baeb;
        }

        .btn-down { background: #333; }
        .btn-reset { background: #333; }
        .btn-fs { background: #007bff; } 

        #scrollBox::-webkit-scrollbar { width: 4px; }
        #scrollBox::-webkit-scrollbar-thumb { background: #555; }
    </style>
</head>
<body>

    <div class="main-container" id="app">
        <div class="controls">
            <label for="fileInput" class="btn-galeri">GALERI</label>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <button class="btn-fs" onclick="toggleFullScreen()" style="padding: 4px 8px; border-radius: 1vw; border:none; color:white;">⛶</button>
        </div>

        <div id="scrollBox"></div>

        <div class="button-group">
            <button class="btn btn-down" onclick="mulaiSlidePelan()">SLIDE DOWN ↓</button>
            <button class="btn btn-reset" onclick="resetSemua()">RESET 🗑️</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const scrollBox = document.getElementById('scrollBox');
        const app = document.getElementById('app');

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                app.requestFullscreen().catch(err => {
                    alert(`Gagal Fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        window.onload = () => {
            const savedData = localStorage.getItem('my_gallery');
            if (savedData) {
                const images = JSON.parse(savedData);
                images.forEach(src => tambahGambar(src, false));
            }
        };

        fileInput.addEventListener('change', function() {
            for (const file of this.files) {
                const reader = new FileReader();
                reader.onload = (e) => tambahGambar(e.target.result, true);
                reader.readAsDataURL(file);
            }
        });

        function tambahGambar(src, isNew) {
            const div = document.createElement('div');
            div.className = 'img-item';
            div.innerHTML = `
                <img src="${src}">
                <div class="delete-overlay">
                    <span>HAPUS?</span>
                    <button class="btn-confirm">YA</button>
                    <button class="btn-cancel">BATAL</button>
                </div>
            `;

            let lastTap = 0;
            div.addEventListener('click', function(e) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                // Deteksi Double Tap (interval < 300ms)
                if (tapLength < 300 && tapLength > 0) {
                    div.querySelector('.delete-overlay').style.display = 'flex';
                    e.preventDefault();
                }
                lastTap = currentTime;
            });

            // Fungsi Tombol Ya
            div.querySelector('.btn-confirm').onclick = (e) => {
                e.stopPropagation();
                div.remove();
                updateStorage();
            };

            // Fungsi Tombol Batal
            div.querySelector('.btn-cancel').onclick = (e) => {
                e.stopPropagation();
                div.querySelector('.delete-overlay').style.display = 'none';
            };

            scrollBox.appendChild(div);
            if (isNew) updateStorage();
        }

        function updateStorage() {
            const allImages = Array.from(document.querySelectorAll('.img-item img')).map(img => img.src);
            localStorage.setItem('my_gallery', JSON.stringify(allImages));
        }

        function mulaiSlidePelan() {
            const targetBawah = scrollBox.scrollHeight;
            const kecepatan = 1.5; 
            function animasi() {
                if (scrollBox.scrollTop < (targetBawah - scrollBox.clientHeight)) {
                    scrollBox.scrollTop += kecepatan;
                    requestAnimationFrame(animasi);
                }
            }
            requestAnimationFrame(animasi);
        }

        function resetSemua() {
            if (confirm("Hapus semua gambar secara permanen?")) {
                scrollBox.innerHTML = '';
                fileInput.value = '';
                localStorage.removeItem('my_gallery');
            }
        }
    </script>
</body>
</html>
