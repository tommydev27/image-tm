<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Gambar Pro Anti-Hilang</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #scrollBox {
            height: 500px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start;
        }

        .img-item {
            width: calc(50% - 5px);
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #444;
            position: relative;
            -webkit-touch-callout: none; 
            user-select: none;
        }

        .img-item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

/* Container hitam transparan yang menutupi gambar */
.delete-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85); /* Hitam transparan */
    display: none; /* Sembunyi secara default */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    z-index: 10;
}

/* Gaya umum untuk tombol di dalam overlay */
.btn-overlay {
    width: 80%;
    padding: 8px;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    font-size: 12px;
}

/* Warna spesifik tombol Hapus */
.btn-del-confirm { 
    background: #ff4444; 
    color: white; 
}

/* Warna spesifik tombol Batal */
.btn-cancel { 
    background: #444; 
    color: white; 
}
        .controls {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 2px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            color: white;
        }

        .btn-down { background: #e60000; }
        .btn-reset { background: #444; }

        #scrollBox::-webkit-scrollbar { width: 6px; }
        #scrollBox::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="controls">
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <div id="scrollBox"></div>

        <div class="button-group">
            <button class="btn btn-down" onclick="mulaiSlidePelan()">SLIDE DOWN ↓</button>
            <button class="btn btn-reset" onclick="resetSemua()">RESET 🗑️</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const scrollBox = document.getElementById('scrollBox');

        window.onload = () => {
            const savedData = localStorage.getItem('my_gallery');
            if (savedData) {
                const images = JSON.parse(savedData);
                images.forEach(src => tambahGambar(src, false));
            }
        };

        fileInput.addEventListener('change', function() {
            for (const file of this.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tambahGambar(e.target.result, true);
                };
                reader.readAsDataURL(file);
            }
        });

        function tambahGambar(src, isNew) {
            const div = document.createElement('div');
            div.className = 'img-item';
            div.innerHTML = `
                <img src="${src}">
                <div class="delete-overlay">
                    <button class="btn-overlay btn-del-confirm">HAPUS</button>
                    <button class="btn-overlay btn-cancel">BATAL</button>
                </div>
            `;

            let clickCount = 0;
            let clickTimer;

            // Logika Ketuk 3 Kali
            div.addEventListener('click', (e) => {
                // Jangan hitung jika yang diklik tombol di dalam overlay
                if (e.target.classList.contains('btn-overlay')) return;

                clickCount++;
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => {
                        clickCount = 0;
                    }, 500); // Waktu toleransi 0.5 detik
                } else if (clickCount === 3) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    div.querySelector('.delete-overlay').style.display = 'flex';
                }
            });

            // Aksi Tombol Hapus
            div.querySelector('.btn-del-confirm').onclick = () => {
                div.remove();
                updateStorage();
            };

            // Aksi Tombol Batal
            div.querySelector('.btn-cancel').onclick = () => {
                div.querySelector('.delete-overlay').style.display = 'none';
            };

            scrollBox.appendChild(div);
            if (isNew) updateStorage();
        }

        function updateStorage() {
            const allImages = [];
            document.querySelectorAll('.img-item img').forEach(img => {
                allImages.push(img.src);
            });
            localStorage.setItem('my_gallery', JSON.stringify(allImages));
        }

        function mulaiSlidePelan() {
            const targetBawah = scrollBox.scrollHeight;
            const kecepatan = 2; 
            function animasi() {
                if (scrollBox.scrollTop < (targetBawah - scrollBox.clientHeight)) {
                    scrollBox.scrollTop += kecepatan;
                    requestAnimationFrame(animasi);
                }
            }
            requestAnimationFrame(animasi);
        }

        function resetSemua() {
            if (confirm("Hapus semua gambar secara permanen?")) {
                scrollBox.innerHTML = '';
                fileInput.value = '';
                localStorage.removeItem('my_gallery');
            }
        }
    </script>
</body>
</html>
